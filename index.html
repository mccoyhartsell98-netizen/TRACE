<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

 <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z8Z41J6Z0H"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Z8Z41J6Z0H');
  </script>

  <title>TRACE — Kiosk</title>
  <style>
    :root{
      --bg:#0b0f16;--panel2:#0f1522;--text:#eaf2ff;
      --muted:rgba(234,242,255,.7);--border:rgba(255,255,255,.12);
      --btn:#0f1b2e;--btn2:#122547;
    }
    html,body{height:100%;margin:0;font-family:system-ui,Segoe UI,Arial;
      background:radial-gradient(1100px 700px at 25% 10%,rgba(42,127,255,.16),transparent 60%),var(--bg);
      color:var(--text);overflow-x:hidden;}
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:18px;}
    .card{width:min(520px,95vw);background:linear-gradient(180deg,rgba(16,26,42,.96),rgba(10,14,22,.96));
      border:1px solid var(--border);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.45);overflow:hidden;}
    .top{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .pill{font-size:12px;border:1px solid var(--border);padding:6px 10px;border-radius:999px;color:var(--muted)}
    .body{padding:14px 16px 16px;}
    .btn{width:100%;background:var(--btn);color:var(--text);border:1px solid var(--border);
      border-radius:14px;padding:14px;font-weight:900;cursor:pointer;transition:.12s background;font-size:14px;}
    .btn:hover{background:var(--btn2)} .btn:active{transform:scale(.985)}
    .btn.sec{background:transparent}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
    .pinDots{font-size:22px;letter-spacing:6px;margin:10px 0 6px}
    .section{margin-top:12px;border:1px solid var(--border);border-radius:14px;padding:12px;background:rgba(15,21,34,.55)}
    .tiny{font-size:15px;color:var(--muted);word-break:break-all;margin-top:8px}
    .hide{display:none!important}
    input{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--border);
      border-radius:12px;padding:12px;font-weight:700;outline:none;box-sizing:border-box;font-size:16px;}

    /* Single overlay class used everywhere */
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.72);
      display:flex;align-items:center;justify-content:center;
      z-index:999;padding:18px;
    }
    .obox{
      background:linear-gradient(180deg,rgba(18,28,46,.99),rgba(10,14,22,.99));
      border:1px solid var(--border);border-radius:18px;
      width:min(460px,95vw);padding:22px;
    }
    .otitle{font-weight:900;font-size:16px;margin-bottom:8px;}
    .osub{font-size:13px;color:var(--muted);margin-bottom:18px;}

    .lane-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
    .mach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
    .sbtn{background:var(--btn);color:var(--text);border:1px solid var(--border);
      border-radius:12px;padding:12px 6px;font-weight:700;font-size:13px;cursor:pointer;text-align:center;}
    .sbtn:hover{background:var(--btn2)}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      padding:12px 28px;border-radius:999px;font-weight:900;font-size:14px;
      z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
    .toast.show{opacity:1;}
    .back{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0;margin-bottom:14px;display:block;}
    .back:hover{color:var(--text)}
  </style>
</head>
<body>

<div class="wrap">
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;width:min(520px,95vw)">
    <img src="./trace-logo.png.png" style="height:350px;width:auto;" alt="TRACE"/>
    <div class="card" style="width:100%">
      <div class="top">
        <div style="font-size:12px;color:var(--muted)">Kiosk Access</div>
        <div class="pill" id="pillStatus">LOCKED</div>
      </div>
      <div class="body">

        <!-- PIN -->
        <div id="viewPin">
          <div style="font-weight:900">Enter PIN</div>
          <div class="pinDots" id="pinDots">____</div>
          <div class="g3" id="pinPad">
            <button class="btn" data-d="1">1</button><button class="btn" data-d="2">2</button><button class="btn" data-d="3">3</button>
            <button class="btn" data-d="4">4</button><button class="btn" data-d="5">5</button><button class="btn" data-d="6">6</button>
            <button class="btn" data-d="7">7</button><button class="btn" data-d="8">8</button><button class="btn" data-d="9">9</button>
            <button class="btn sec" id="pinBack">&#x232B;</button>
            <button class="btn" data-d="0">0</button>
            <button class="btn sec" id="pinClear">C</button>
          </div>
          <div class="g2">
            <button class="btn" id="pinSubmit">UNLOCK</button>
            <button class="btn sec" id="pinAdmin">Admin Login</button>
          </div>
          <div id="pinMsg" style="font-size:12px;color:var(--muted);text-align:center;padding:8px 0;min-height:20px;"></div>
        </div>

        <!-- HUB -->
        <div id="viewHub" class="hide">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-weight:900;font-size:15px" id="hubGreet">—</div>
            <button class="btn sec" style="width:auto;padding:8px 14px" id="hubLogout">Logout</button>
          </div>
          <div class="g2" style="margin-top:12px">
            <button class="btn" id="hubMove">MOVE</button>
            <button class="btn" id="hubStatus">STATUS</button>
            <button class="btn" id="hubSearch">SEARCH</button>
            <button class="btn sec" id="hubAdmin">ADMIN</button>
          </div>
          <div class="section">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div style="font-weight:900">Scanned Job</div>
              <div class="pill" id="jobStatus">—</div>
            </div>
            <div class="tiny" id="jobLine">No job loaded</div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!--   OVERLAY 1 — Full or Partial?   -->
<div class="overlay hide" id="ovPartial">
  <div class="obox">
    <div class="otitle">Taking the full job?</div>
    <div class="osub" id="ovPartialInfo">—</div>
    <div class="g2" style="margin-top:0">
      <button class="btn" id="btnYesFull">YES — TAKE ALL</button>
      <button class="btn sec" id="btnNoPartial">NO — PARTIAL</button>
    </div>
    <!-- shown only when they hit NO -->
    <div id="qtyArea" class="hide" style="margin-top:16px">
      <div style="font-size:13px;color:var(--muted);margin-bottom:8px">How many are you taking?</div>
      <input id="qtyInput" type="number" min="1" placeholder="Enter qty…"/>
      <button class="btn" id="btnConfirmQty" style="margin-top:10px">CONFIRM QTY &amp; PICK LOCATION</button>
    </div>
    <button class="btn sec" id="btnCancelPartial" style="margin-top:12px">Cancel</button>
  </div>
</div>

<!--  OVERLAY 2 — Pick destination   -->
<div class="overlay hide" id="ovDest">
  <div class="obox">

    <!-- 2a: Lane or Machine? -->
    <div id="destType">
      <div class="otitle">Move to — Lane or Machine?</div>
      <div class="g2" style="margin-top:0">
        <button class="btn" id="btnPickLane">LANE</button>
        <button class="btn" id="btnPickMachine">MACHINE</button>
      </div>
      <button class="btn sec" id="btnCancelDest" style="margin-top:12px">Cancel</button>
    </div>

    <!-- 2b: Pick lane number -->
    <div id="destLanes" class="hide">
      <button class="back" id="backFromLanes">&#x2190; Back</button>
      <div class="otitle">Select Lane</div>
      <div class="lane-grid" id="laneGrid"></div>
    </div>

    <!-- 2c: Pick machine -->
    <div id="destMachines" class="hide">
      <button class="back" id="backFromMachines">&#x2190; Back</button>
      <div class="otitle">Select Machine</div>
      <div class="mach-grid" id="machGrid"></div>
    </div>

  </div>
</div>

<!--   OVERLAY 3 — Multi-pallet picker   -->
<div class="overlay hide" id="ovWhich">
  <div class="obox">
    <div class="otitle" style="color:#ffd166">Multiple Pallets Found</div>
    <div class="osub">Which pallet are you moving?</div>
    <div id="whichGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px"></div>
    <button class="btn sec" id="btnWhichCancel" style="margin-top:14px">Cancel</button>
  </div>
</div>

<!--   OVERLAY 4 — Search   -->
<div class="overlay hide" id="ovSearch">
  <div class="obox">
    <div class="otitle">Search Job / MO</div>
    <input id="searchInput" placeholder="Job number or MO…"/>
    <div class="g2" style="margin-top:10px">
      <button class="btn" id="btnDoSearch">SEARCH</button>
      <button class="btn sec" id="btnSearchCancel">Cancel</button>
    </div>
    <div id="searchMsg" style="font-size:12px;color:var(--muted);padding:8px 0;min-height:20px;"></div>
    <div id="searchResult" class="hide" style="border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:4px">
      <div style="font-weight:900" id="srTitle">—</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px" id="srSub">—</div>
      <button class="btn" id="btnLoadSearchJob" style="margin-top:12px">LOAD THIS JOB</button>
    </div>
  </div>
</div>

<div class="overlay hide" id="ovStatus">
  <div class="obox">
    <div class="otitle">Update Status</div>
    <div class="osub" id="ovStatusJob">—</div>
    <div id="statusBtnGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;"></div>
    <button class="btn sec" id="btnStatusCancel" style="margin-top:12px;">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API  = "https://trace-api-sak3.onrender.com";
const ADMIN = "./admin.html";
const $     = id => document.getElementById(id);

// ── state ──────────────────────────────────────────────────────────────────
let activeItem = null;  // { id, job, mo, qty, status, lane, machine, location_id, notes }
let takingQty  = null;  // null = full job, number = partial
let locations  = [];
let inventory  = [];
let locByLane  = new Map();  // "Lane 5" → id
let locByMach  = new Map();  // "S8"     → id
let pinBuf     = "";
let pendingSearch = null;
let pinAttempts = 0;
const PIN_MAX_ATTEMPTS = 5;

const scannedJob = (new URLSearchParams(location.search).get("job") || "").trim().toUpperCase();

// ── toast ──────────────────────────────────────────────────────────────────
function toast(msg, err=false) {
  const t=$("toast");
  t.textContent=msg;
  t.style.cssText=`background:${err?"#3a1a1a":"#1a3a1a"};border:1px solid ${err?"#7a2d2d":"#2d7a2d"};color:${err?"#ff7f7f":"#7fff7f"};`;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3500);
}

// ── PIN ────────────────────────────────────────────────────────────────────
function renderPin(){
  $("pinDots").textContent=(pinBuf+"____").slice(0,4).split("").map(c=>c==="_"?"_":"•").join("");
}
$("pinPad").addEventListener("click",e=>{
  const d=e.target.closest("[data-d]")?.dataset.d;
  if(d!==undefined && pinBuf.length<4){ pinBuf+=d; renderPin(); }
});
$("pinBack").onclick  =()=>{ pinBuf=pinBuf.slice(0,-1); renderPin(); };
$("pinClear").onclick =()=>{ pinBuf=""; renderPin(); };
$("pinAdmin").onclick =()=>location.href=ADMIN;

$("pinSubmit").onclick=async()=>{
  if(pinAttempts >= PIN_MAX_ATTEMPTS){
    $("pinMsg").textContent="Too many attempts — contact your supervisor";
    pinBuf=""; renderPin(); return;
  }
  if(!/^\d{4}$/.test(pinBuf)){$("pinMsg").textContent="PIN must be 4 digits";return;}
  $("pinMsg").textContent="Checking…";
  try{
    const r=await fetch(`${API}/auth/pin-login`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({pin:pinBuf})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok||d.ok===false) throw d;
    pinAttempts=0;
    localStorage.setItem("tt",d.token);
    localStorage.setItem("tu",JSON.stringify(d.user));
    pinBuf="";renderPin();$("pinMsg").textContent="";
    enterHub(d.user);
  }catch(e){
    pinAttempts++;
    const left=PIN_MAX_ATTEMPTS-pinAttempts;
    $("pinMsg").textContent=left>0?`Invalid PIN — ${left} attempt${left===1?"":"s"} left`:"Too many attempts — contact your supervisor";
    pinBuf="";renderPin();
  }
};

function auth(){return{token:localStorage.getItem("tt"),user:JSON.parse(localStorage.getItem("tu")||"null")};}
function clearAuth(){localStorage.removeItem("tt");localStorage.removeItem("tu");}

// ── data ───────────────────────────────────────────────────────────────────
async function loadLocations(){
  try{
    const r=await fetch(`${API}/locations`,{cache:"no-store"});
    const d=await r.json().catch(()=>({}));
    const raw=Array.isArray(d)?d:(d.locations||d.rows||[]);
    locations=raw.map(x=>({
      id:Number(x.location_id??x.id),
      laneNum:String(x.lane??x.lane_number??x.laneNum??"").trim(),
      machName:String(x.machine??x.machine_name??x.machineName??x.name??"").trim()
    })).filter(x=>x.id>0);
    locByLane.clear(); locByMach.clear();
    locations.forEach(l=>{
      if(l.laneNum)  locByLane.set("Lane "+l.laneNum, l.id);
      if(l.machName) locByMach.set(l.machName, l.id);
    });
  }catch(e){console.warn(e);}
}

async function loadInventory(){
  try{
    const r=await fetch(`${API}/items`,{cache:"no-store"});
    const d=await r.json().catch(()=>({}));
    const raw=Array.isArray(d)?d:(d.items||d.rows||[]);
    inventory=raw.map(it=>{
      const lid=Number(it.location_id??it.locationId??0);
      const loc=locations.find(l=>l.id===lid);
      return{
        id:it.item_id??it.id,
        job:String(it.job_number??it.job??"").trim().toUpperCase(),
        mo:String(it.mo??"").trim().toUpperCase(),
        qty:parseInt(it.qty??0,10),
        status:String(it.status??"").trim(),
        lane:loc?.laneNum?`Lane ${loc.laneNum}`:"",
        machine:loc?.machName||"",
        location_id:lid,
        notes:it.notes||""
      };
    }).filter(x=>x.job&&x.status.toLowerCase()!=="deleted");
  }catch(e){console.warn(e);}
}

function findJob(q){
  const s=String(q).trim().toUpperCase();
  return inventory.filter(x=>x.job===s||x.mo===s);
}

// ── hub ────────────────────────────────────────────────────────────────────
async function enterHub(user){
  const h=new Date().getHours();
  $("hubGreet").textContent=(h<12?"Good Morning":h<17?"Good Afternoon":"Good Evening")+", "+(user.display_name||user.name||"Driver");
  $("hubAdmin").style.display=user.role==="admin"?"block":"none";
  $("pillStatus").textContent="UNLOCKED";
  $("viewPin").classList.add("hide");
  $("viewHub").classList.remove("hide");
  $("jobLine").textContent="Loading…";
  await loadLocations();
  await loadInventory();
  buildKioskLaneButtons();
  // load job from QR scan
  if(scannedJob){
    const m=findJob(scannedJob);
    if(!m.length){$("jobLine").textContent=`Job #${scannedJob} not found`;$("jobStatus").textContent="NOT FOUND";}
    else if(m.length===1) setActive(m[0]);
    else showWhich(m,picked=>setActive(picked));
  } else {
    $("jobLine").textContent="No job loaded";
  }
}

function setActive(item){
  activeItem=item;
  const loc=item.machine?`Machine ${item.machine}`:(item.lane||"No location");
  const moStr = item.mo ? `MO ${item.mo} &bull; ` : `<span style="color:#ff7f7f;font-size:12px;">MO missing</span><span style="color:#eaf2ff;"> &bull; </span>`;
$("jobLine").innerHTML=`<span style="color:#eaf2ff;font-weight:700;">Job ${item.job} &bull; </span>${moStr}<span style="color:#eaf2ff;font-weight:700;">QTY ${item.qty}</span><br><span style="color:#6dbf8a;font-size:15px;">Location: ${loc}</span>`;
$("jobStatus").textContent=item.status||"active";
const statusColors={
  "Printed":"#1a3a1a;color:#7fff7f",
  "On Press":"#3a2a00;color:#ffd166",
  "On Hold":"#3a1a1a;color:#ff7f7f",
  "Completed":"#1a3a1a;color:#7fff7f",
  "Tauro Queue":"#1a2a3a;color:#4fc3f7",
};
const sc=statusColors[item.status]||"transparent;color:var(--muted)";
$("jobStatus").style.cssText=`background:${sc.split(";")[0]};${sc.split(";")[1]};border-color:transparent;`;
}

$("hubLogout").onclick=()=>{
  clearAuth();activeItem=null;takingQty=null;
  $("viewHub").classList.add("hide");$("viewPin").classList.remove("hide");
  $("pillStatus").textContent="LOCKED";
};
$("hubAdmin").onclick=()=>location.href=ADMIN;
$("hubSearch").onclick=openSearch;

// ══════════════════════════════════════════════════════════════════════════
//   MOVE BUTTON FLOW
// ══════════════════════════════════════════════════════════════════════════
$("hubMove").onclick=()=>{
  if(!activeItem){toast("No job loaded — scan a job first",true);return;}
  const {user}=auth();
  if(user?.role==="operator"){
    doMove("Lane 1", locByLane.get("Lane 1"));
  } else {
    openPartial();
  }
};

// ── Overlay 1: Full or Partial? ────────────────────────────────────────────
function openPartial(){
  takingQty=null;
  $("ovPartialInfo").textContent=`Job ${activeItem.job}  \u2022  MO ${activeItem.mo||"-"}  \u2022  QTY ${activeItem.qty}`;
  $("qtyArea").classList.add("hide");
  $("qtyInput").value="";
  $("ovPartial").classList.remove("hide");
}

$("btnYesFull").onclick=()=>{
  takingQty=null;
  $("ovPartial").classList.add("hide");
  openDest();
};

$("btnNoPartial").onclick=()=>{
  $("qtyArea").classList.remove("hide");
  $("qtyInput").focus();
};

$("btnConfirmQty").onclick=()=>{
  const v=parseInt($("qtyInput").value||"0",10);
  if(!v||v<=0){toast("Enter a valid qty",true);return;}
  if(v>=activeItem.qty){toast("That covers the full qty — tap YES instead",true);return;}
  takingQty=v;
  $("ovPartial").classList.add("hide");
  openDest();
};

$("btnCancelPartial").onclick=()=>{$("ovPartial").classList.add("hide");takingQty=null;};

// ── Overlay 2: Pick destination ────────────────────────────────────────────
function openDest(){
  $("destType").classList.remove("hide");
  $("destLanes").classList.add("hide");
  $("destMachines").classList.add("hide");
  $("ovDest").classList.remove("hide");
}
function closeDest(){$("ovDest").classList.add("hide");}

$("btnPickLane").onclick   =()=>{$("destType").classList.add("hide");$("destLanes").classList.remove("hide");};
$("btnPickMachine").onclick=()=>{$("destType").classList.add("hide");$("destMachines").classList.remove("hide");};
$("backFromLanes").onclick   =()=>{$("destLanes").classList.add("hide");$("destType").classList.remove("hide");};
$("backFromMachines").onclick=()=>{$("destMachines").classList.add("hide");$("destType").classList.remove("hide");};
$("btnCancelDest").onclick   =()=>{closeDest();takingQty=null;};

// Build lane buttons 1-12
function buildKioskLaneButtons(){
  const g=$("laneGrid");
  g.innerHTML="";
  const sorted = locations
    .filter(l=>l.laneNum)
    .sort((a,b)=>{
      const aStr=String(a.laneNum), bStr=String(b.laneNum);
      const aNum=parseInt(aStr,10), bNum=parseInt(bStr,10);
      const aIsA=/[A-Za-z]/.test(aStr), bIsA=/[A-Za-z]/.test(bStr);
      if(aIsA!==bIsA) return aIsA?1:-1;
      if(aNum!==bNum) return aNum-bNum;
      return aStr.localeCompare(bStr,undefined,{numeric:true});
    });
  if(sorted.length===0){
    g.innerHTML=`<div style="color:var(--muted);font-size:13px;grid-column:1/-1;">No lanes found.</div>`;
    return;
  }
  let dividerAdded = false;
  sorted.forEach(l=>{
    const isALane = /[A-Za-z]/.test(l.laneNum);
    if(isALane && !dividerAdded){
      dividerAdded = true;
      const div = document.createElement("div");
      div.style.cssText = "grid-column:1/-1;height:1px;background:rgba(42,127,255,.3);margin:4px 0;";
      g.appendChild(div);
    }
    const label="Lane "+l.laneNum;
    const b=document.createElement("button");
    b.className="sbtn";b.textContent=label;
    b.onclick=()=>doMove(label, locByLane.get(label));
    g.appendChild(b);
  });

// Build machine buttons
["S8","S9","S61","S62","S63","500","Multi Fold","LCI","Six Lane"].forEach(m=>{
  const b=document.createElement("button");
  b.className="sbtn";b.textContent=m;
  b.onclick=()=>doMove(m, locByMach.get(m));
  $("machGrid").appendChild(b);
});

// ── The actual API calls ────────────────────────────────────────────────────
async function doMove(label, destId){
  closeDest();
  if(!destId){toast(`"${label}" has no DB location`,true);return;}
  const {token,user}=auth();
  const by=user?.display_name||user?.name||"kiosk";
  const item=activeItem;

  try{
    const body={location_id:destId, updated_by:by};
    if(takingQty!==null) body.qty=takingQty;

    const r=await fetch(`${API}/items/${item.id}/move`,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
      body:JSON.stringify(body)
    });
    if(r.status===401){
      clearAuth();
      toast("Session expired — please log in again",true);
      setTimeout(()=>{
        activeItem=null;takingQty=null;
        $("viewHub").classList.add("hide");
        $("viewPin").classList.remove("hide");
        $("pillStatus").textContent="LOCKED";
      },1500);
      return;
    }
    const d=await r.json().catch(()=>({}));
    if(!r.ok||d.ok===false) throw new Error(d.error||"Move failed");

    if(takingQty!==null){
      const remaining=item.qty-takingQty;
      toast(`${takingQty} of ${item.job} \u2192 ${label} \u2022 ${remaining} remaining`);
      // Non-blocking email notify
      fetch(`${API}/notify/partial-pick`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({job:item.job,mo:item.mo,taken:takingQty,remaining,destination:label,driver:by})
      }).catch(()=>{});
    } else {
      toast(`Job ${item.job} moved to ${label}`);
    }

    takingQty=null;
    await loadLocations();
    await loadInventory();
    buildKioskLaneButtons();
    const fresh=findJob(item.job);
    if(fresh.length) setActive(fresh[0]);

  }catch(e){
    toast(e.message||"Move failed",true);
  }
}

async function put(id,body,token){
  const r=await fetch(`${API}/items/${id}`,{method:"PUT",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify(body)});
  if(r.status===401){
    clearAuth();
    toast("Session expired — please log in again",true);
    setTimeout(()=>{
      activeItem=null;takingQty=null;
      $("viewHub").classList.add("hide");
      $("viewPin").classList.remove("hide");
      $("pillStatus").textContent="LOCKED";
    },1500);
    throw new Error("Session expired");
  }
  const d=await r.json().catch(()=>({}));
  if(!r.ok||d.ok===false) throw new Error(d.error||"Update failed");
  return d;
}
async function post(body,token){
  const r=await fetch(`${API}/items`,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify(body)});
  if(r.status===401){
    clearAuth();
    toast("Session expired — please log in again",true);
    setTimeout(()=>{
      activeItem=null;takingQty=null;
      $("viewHub").classList.add("hide");
      $("viewPin").classList.remove("hide");
      $("pillStatus").textContent="LOCKED";
    },1500);
    throw new Error("Session expired");
  }
  const d=await r.json().catch(()=>({}));
  if(!r.ok||d.ok===false) throw new Error(d.error||"Create failed");
  return d;
}

// ── Multi-pallet picker ─────────────────────────────────────────────────────
function showWhich(matches, onPick){
  const g=$("whichGrid");g.innerHTML="";
  matches.forEach(item=>{
    const loc=item.machine?`Machine ${item.machine}`:(item.lane||"No location");
    const b=document.createElement("button");
    b.className="sbtn";
    b.innerHTML=`<div style="font-size:14px;font-weight:900">${loc}</div><div style="font-size:11px;margin-top:3px;opacity:.7">QTY ${item.qty}</div>`;
    b.onclick=()=>{$("ovWhich").classList.add("hide");onPick(item);};
    g.appendChild(b);
  });
  $("btnWhichCancel").onclick=()=>$("ovWhich").classList.add("hide");
  $("ovWhich").classList.remove("hide");
}

// ── Search ──────────────────────────────────────────────────────────────────
function openSearch(){
  $("searchInput").value="";$("searchMsg").textContent="";
  $("searchResult").classList.add("hide");pendingSearch=null;
  $("ovSearch").classList.remove("hide");
  setTimeout(()=>$("searchInput").focus(),50);
}
$("btnSearchCancel").onclick=()=>$("ovSearch").classList.add("hide");

$("btnDoSearch").onclick=()=>{
  const q=$("searchInput").value.trim();
  if(!q){$("searchMsg").textContent="Enter a job number or MO.";return;}
  const m=findJob(q);
if(!m.length){$("searchMsg").textContent="Not found in TRACE.";$("searchResult").classList.add("hide");return;}

// Multiple matches — show the which-pallet picker then load result
if(m.length>1){
  $("ovSearch").classList.add("hide");
  showWhich(m, picked=>{
    setActive(picked);
    toast("Job loaded");
  });
  return;
}

pendingSearch=m[0];
$("searchMsg").textContent="";
const loc=m[0].machine?`Machine ${m[0].machine}`:(m[0].lane||"No location");
$("srTitle").textContent=`Job ${m[0].job} \u2022 MO ${m[0].mo||"-"} \u2022 QTY ${m[0].qty}`;
$("srSub").innerHTML=`<span style="color:#6dbf8a;font-size:13px;">Location: ${loc}</span>`;
$("searchResult").classList.remove("hide");
};  // ← closes btnDoSearch.onclick

$("btnLoadSearchJob").onclick=()=>{
  if(!pendingSearch) return;
  setActive(pendingSearch);
  $("ovSearch").classList.add("hide");
  toast("Job loaded");
};


// ====== STATUS UPDATE ======
const STATUSES_KEY = "trace_statuses_v1";
const DEFAULT_STATUSES = ["Tauro Queue","On Press","Printed","Partially Printed","On Hold","Completed","Move To Lane"];

function getStatuses(){
  try{ const r = localStorage.getItem(STATUSES_KEY); return r ? JSON.parse(r) : [...DEFAULT_STATUSES]; }
  catch(e){ return [...DEFAULT_STATUSES]; }
}

$("hubStatus").onclick = () => {
  if(!activeItem){ toast("No job loaded — scan a job first", true); return; }
  $("ovStatusJob").textContent = `Job ${activeItem.job} • Current: ${activeItem.status || "—"}`;
  const grid = $("statusBtnGrid");
  grid.innerHTML = "";
  getStatuses().forEach(s => {
    const b = document.createElement("button");
    b.className = "btn";
    b.textContent = s;
    b.onclick = () => applyStatus(s);
    grid.appendChild(b);
  });
  $("ovStatus").classList.remove("hide");
};

$("btnStatusCancel").onclick = () => $("ovStatus").classList.add("hide");

async function applyStatus(status){
  $("ovStatus").classList.add("hide");
  const { token, user } = auth();
  const by = user?.display_name || user?.name || "kiosk";
  try{
    await put(activeItem.id, {
      location_id: activeItem.location_id,
      mo: activeItem.mo || "",
      qty: activeItem.qty,
      status: status,
      notes: activeItem.notes || "",
      updated_by: by
    }, token);
    activeItem.status = status;
    setActive(activeItem);
    toast(`Status updated → ${status}`);
  } catch(e){
    toast(e.message || "Update failed", true);
  }
}

// ── Boot ────────────────────────────────────────────────────────────────────
(async function boot(){
  renderPin();
  try{
    const r=await fetch(`${API}/health`,{cache:"no-store"});
    $("pillStatus").textContent="LOCKED";
  }catch(e){$("pillStatus").textContent="LOCKED";}
  const {token,user}=auth();
  if(token&&user) enterHub(user);
})();
</script>
